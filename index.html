<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scouting Hexapod – 3D CAD Models</title>
  <style>
    :root {
      --bg:           #0d1117;
      --surface:      #161b22;
      --border:       #30363d;
      --accent:       #58a6ff;
      --text:         #e6edf3;
      --text-muted:   #8b949e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    .badge {
      background: var(--accent);
      color: #0d1117;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .gh-link {
      margin-left: auto;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.82rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.15s;
    }
    .gh-link:hover { color: var(--text); }

    /* ── Layout ──────────────────────────────────────────── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    .sidebar {
      width: 250px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      flex-shrink: 0;
    }
    #file-list { flex: 1; overflow-y: auto; }

    .file-item {
      padding: 9px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      font-size: 0.83rem;
      display: flex;
      align-items: center;
      gap: 9px;
      transition: background 0.12s;
      border-left: 2px solid transparent;
    }
    .file-item:hover  { background: rgba(255,255,255,0.04); }
    .file-item.active {
      background: rgba(88,166,255,0.1);
      border-left-color: var(--accent);
    }
    .file-icon  { font-size: 1rem; flex-shrink: 0; }
    .file-name  { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .file-size  { color: var(--text-muted); font-size: 0.72rem; flex-shrink: 0; }

    .empty-msg {
      padding: 20px 16px;
      color: var(--text-muted);
      font-size: 0.83rem;
      line-height: 1.65;
    }
    .empty-msg code {
      background: rgba(255,255,255,0.07);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 0.82em;
    }

    /* ── Viewer ──────────────────────────────────────────── */
    .viewer-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #canvas-wrap {
      flex: 1;
      position: relative;
      cursor: grab;
    }
    #canvas-wrap:active { cursor: grabbing; }
    #canvas-wrap canvas  { display: block; width: 100% !important; height: 100% !important; }

    /* progress bar */
    #prog {
      position: absolute;
      top: 0; left: 0;
      height: 2px;
      width: 0;
      background: var(--accent);
      transition: width 0.25s ease;
      z-index: 10;
    }

    /* overlay (prompt / loading / error) */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .ol-box {
      text-align: center;
      color: var(--text-muted);
    }
    .ol-box h2 { font-size: 1.4rem; font-weight: 300; margin-bottom: 6px; }
    .ol-box p  { font-size: 0.88rem; }

    /* footer strip */
    .viewer-foot {
      padding: 7px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      font-size: 0.78rem;
      color: var(--text-muted);
      flex-shrink: 0;
      gap: 10px;
    }
    #cur-name { color: var(--text); font-weight: 500; }
    .download-btn {
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--border);
      background: rgba(88,166,255,0.12);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }
    .download-btn:hover {
      background: rgba(88,166,255,0.2);
      border-color: var(--accent);
    }
    .download-btn[aria-disabled="true"] {
      pointer-events: none;
      opacity: 0.5;
    }
    .hint { margin-left: auto; }

    /* ── Responsive (narrow screens) ────────────────────── */
    @media (max-width: 580px) {
      .sidebar { width: 180px; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<header>
  <h1>🤖 Scouting Hexapod</h1>
  <span class="badge">3D Models</span>
  <a class="gh-link"
     href="https://github.com/Truli134/Scouting-Hexapod-3D-CAD-Models"
     target="_blank" rel="noopener">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
      <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
               0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
               -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
               .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
               -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0
               1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82
               1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01
               1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
    </svg>
    View on GitHub
  </a>
</header>

<!-- ── Body ────────────────────────────────────────────────── -->
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-head">Parts <span id="count"></span></div>
    <div id="file-list">
      <div class="empty-msg">Fetching models…</div>
    </div>
  </aside>

  <!-- 3D Viewer -->
  <div class="viewer-area">
    <div id="canvas-wrap">
      <div id="prog"></div>
      <div id="overlay">
        <div class="ol-box">
          <h2>Select a Part</h2>
          <p>Choose a model from the list on the left</p>
        </div>
      </div>
    </div>
    <div class="viewer-foot">
      <span id="cur-name">No model loaded</span>
      <a id="download-btn" class="download-btn" href="#" aria-disabled="true">Download STL</a>
      <span class="hint">Drag to rotate &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Right-click to pan</span>
    </div>
  </div>

</div>

<!-- ── Three.js via importmap ───────────────────────────────── -->
<script type="importmap">
{
  "imports": {
    "three":          "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE               from 'three';
import { STLLoader }            from 'three/addons/loaders/STLLoader.js';
import { OrbitControls }        from 'three/addons/controls/OrbitControls.js';

/* ── Config ──────────────────────────────────────────────── */
const REPO   = 'Truli134/Scouting-Hexapod-3D-CAD-Models';
const BRANCH = 'main';

/* ── GitHub API: list every .stl in the repo ─────────────── */
async function fetchSTLFiles() {
  try {
    const res = await fetch(
      `https://api.github.com/repos/${REPO}/git/trees/${BRANCH}?recursive=1`
    );
    if (!res.ok) throw new Error(`GitHub API returned ${res.status}`);
    const data = await res.json();
    if (data.truncated) console.warn('Repo tree truncated – some files may be missing.');
    return data.tree
      .filter(f => f.type === 'blob' && f.path.toLowerCase().endsWith('.stl'))
      .map(f => ({
        path: f.path,
        name: f.path.split('/').pop().replace(/\.stl$/i, '').replace(/[_-]+/g, ' '),
        url:  `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${encodeURIComponent(f.path).replace(/%2F/g, '/')}`,
        size: f.size,
      }));
  } catch (err) {
    console.error('Could not fetch file list:', err);
    return null; // null = network/API error
  }
}

function fmtSize(b) {
  if (b < 1024)             return `${b} B`;
  if (b < 1024 * 1024)      return `${(b / 1024).toFixed(0)} KB`;
  return `${(b / (1024 * 1024)).toFixed(1)} MB`;
}

/* ── Three.js scene ──────────────────────────────────────── */
const wrap     = document.getElementById('canvas-wrap');
const prog     = document.getElementById('prog');
const overlay  = document.getElementById('overlay');
const curName  = document.getElementById('cur-name');
const downloadBtn = document.getElementById('download-btn');

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
wrap.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1117);

// Grid floor
const grid = new THREE.GridHelper(300, 50, 0x21262d, 0x21262d);
scene.add(grid);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.55));

const sun = new THREE.DirectionalLight(0xffffff, 1.3);
sun.position.set(8, 14, 10);
sun.castShadow = true;
scene.add(sun);

const fill = new THREE.DirectionalLight(0x88aaff, 0.35);
fill.position.set(-6, 4, -5);
scene.add(fill);

const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 50000);
camera.position.set(0, 6, 14);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping  = true;
controls.dampingFactor  = 0.07;
controls.autoRotate     = true;
controls.autoRotateSpeed = 1.2;

// Resize renderer when container resizes
new ResizeObserver(() => {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}).observe(wrap);

// Render loop
(function loop() { requestAnimationFrame(loop); controls.update(); renderer.render(scene, camera); })();

/* ── Model loading ───────────────────────────────────────── */
let activeMesh = null;
const loader   = new STLLoader();

function showOverlay(html) {
  overlay.innerHTML = `<div class="ol-box">${html}</div>`;
  overlay.style.display = 'flex';
}
function hideOverlay() { overlay.style.display = 'none'; }

function setProgress(pct) { prog.style.width = pct + '%'; }

function updateDownloadButton(file) {
  if (!file) {
    downloadBtn.href = '#';
    downloadBtn.removeAttribute('download');
    downloadBtn.setAttribute('aria-disabled', 'true');
    return;
  }

  const fileName = file.path.split('/').pop();
  downloadBtn.href = file.url;
  downloadBtn.setAttribute('download', fileName);
  downloadBtn.setAttribute('aria-disabled', 'false');
}

function loadModel(file) {
  // Dispose previous
  if (activeMesh) {
    scene.remove(activeMesh);
    activeMesh.geometry.dispose();
    activeMesh.material.dispose();
    activeMesh = null;
  }

  curName.textContent = file.name;
  updateDownloadButton(file);
  setProgress(20);
  showOverlay('<h2>Loading…</h2><p>' + fmtSize(file.size) + '</p>');

  loader.load(
    file.url,
    /* onLoad */ (geo) => {
      setProgress(95);
      geo.computeVertexNormals();

      // Center geometry at origin
      geo.computeBoundingBox();
      const bbox   = geo.boundingBox;
      const center = new THREE.Vector3();
      bbox.getCenter(center);
      const size   = new THREE.Vector3();
      bbox.getSize(size);

      const material = new THREE.MeshPhongMaterial({
        color:     0x58a6ff,
        specular:  0x112244,
        shininess: 55,
        side: THREE.DoubleSide,
      });

      activeMesh = new THREE.Mesh(geo, material);
      activeMesh.castShadow    = true;
      activeMesh.receiveShadow = true;

      // Scale so longest axis = 8 units
      const maxDim = Math.max(size.x, size.y, size.z);
      const s = 8 / maxDim;
      activeMesh.scale.setScalar(s);

      // Move so bottom of model sits on the grid (y = 0)
      activeMesh.position.set(
        -center.x * s,
        -bbox.min.y * s,
        -center.z * s
      );

      scene.add(activeMesh);

      // Point camera at model
      const dist = 8 * 1.8;
      camera.position.set(dist, dist * 0.6, dist);
      controls.target.set(0, 4, 0);
      controls.update();

      setProgress(100);
      setTimeout(() => setProgress(0), 350);
      hideOverlay();
    },
    /* onProgress */ (xhr) => {
      if (xhr.total) setProgress(20 + (xhr.loaded / xhr.total) * 70);
    },
    /* onError */ (err) => {
      setProgress(0);
      showOverlay('<h2>⚠️ Failed to load</h2><p>Could not fetch this file.</p>');
      console.error(err);
    }
  );
}

/* ── Build sidebar file list ─────────────────────────────── */
function buildList(files) {
  const listEl  = document.getElementById('file-list');
  const countEl = document.getElementById('count');

  if (files === null) {
    listEl.innerHTML = `<div class="empty-msg">
      ⚠️ Could not reach the GitHub API.<br>
      Check your internet connection and try refreshing.
    </div>`;
    return;
  }

  if (files.length === 0) {
    listEl.innerHTML = `<div class="empty-msg">
      No <code>.stl</code> files found yet.<br><br>
      Add STL files to the repo and they will appear here automatically.
    </div>`;
    return;
  }

  countEl.textContent = `(${files.length})`;
  listEl.innerHTML = '';
  let active = null;

  files.forEach((file, i) => {
    const el = document.createElement('div');
    el.className = 'file-item';
    el.title     = file.path;
    el.innerHTML = `
      <span class="file-icon">⬡</span>
      <span class="file-name">${file.name}</span>
      <span class="file-size">${fmtSize(file.size)}</span>`;

    el.addEventListener('click', () => {
      if (active) active.classList.remove('active');
      el.classList.add('active');
      active = el;
      loadModel(file);
    });

    listEl.appendChild(el);

    // Auto-select the first file
    if (i === 0) {
      el.classList.add('active');
      active = el;
      setTimeout(() => loadModel(file), 80);
    }
  });
}

/* ── Boot ────────────────────────────────────────────────── */
fetchSTLFiles().then(buildList);
</script>
</body>
</html>
